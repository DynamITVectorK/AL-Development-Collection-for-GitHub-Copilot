name: "ALDC Core Validate"
description: "Validates ALDC Core v1.1 compliance"
inputs:
  config:
    description: "Path to aldc.yaml"
    required: false
    default: "aldc.yaml"
runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install dependencies
      run: npm install js-yaml
      shell: bash
      working-directory: tools/aldc-validate
    - name: Run ALDC Validator
      run: node tools/aldc-validate/index.js --config ${{ inputs.config }}
      shell: bash
